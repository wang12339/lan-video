services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: lan_video
      POSTGRES_PASSWORD: lan_video
      POSTGRES_DB: lan_video
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lan_video"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    ports:
      - "8082:8082"
    environment:
      DATABASE_URL: postgres://lan_video:lan_video@db:5432/lan_video
      SERVER_PORT: "8082"
      MEDIA_ROOT: /data/media
      ENFORCE_ADMIN_TOKEN: "false"
    volumes:
      - media_data:/data/media
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
  media_data:
